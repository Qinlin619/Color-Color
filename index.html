<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color & Color - 颜色方块连连看</title>
    <meta name="description" content="一个极简而精美的颜色方块连连看游戏，挑战你的视觉与反应。">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <div class="modal main-start">
                <h1 class="title large">Color & Color</h1>
                <p class="subtitle" data-i18n="subtitle">match the ketchup</p>
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button id="start-game-btn" class="primary-btn pulse" data-i18n="startBtn">进入</button>
                <p class="producer" data-i18n="producer">制作人：伞伞</p>
            </div>
        </div>

        <!-- Palette Selection Screen -->
        <div id="palette-screen" class="overlay hidden">
            <div class="modal">
                <h2 id="palette-title" class="title" data-i18n="paletteTitle">选择你的色板</h2>
                <div class="palette-grid">
                    <div id="rainbow-mode-btn" class="palette-card">
                        <div class="palette-preview rainbow"></div>
                        <span class="best-time">--:--</span>
                    </div>
                    <div id="morandi-mode-btn" class="palette-card">
                        <div class="palette-preview morandi"></div>
                        <span class="best-time">--:--</span>
                    </div>
                    <div id="macaron-mode-btn" class="palette-card">
                        <div class="palette-preview macaron"></div>
                        <span class="best-time">--:--</span>
                    </div>
                    <div id="matisse-mode-btn" class="palette-card">
                        <div class="palette-preview matisse"></div>
                        <span class="best-time">--:--</span>
                    </div>
                </div>
                <button id="palette-back-btn" class="secondary-btn" data-i18n="backBtn">BACK</button>
            </div>
        </div>

        <header>
            <h1 class="title">Color & Color</h1>
            <div class="stats-container">
                <div class="stat-item">
                    <span class="label" data-i18n="levelLabel">LEVEL</span>
                    <span id="level-value" class="value">1</span>
                </div>
                <div class="stat-item">
                    <span class="label" data-i18n="timeLabel">TIME</span>
                    <span id="timer-value" class="value">00:00</span>
                </div>
            </div>
        </header>

        <div class="controls-row">
            <div id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </div>
            <div id="audio-toggle" class="audio-toggle-btn" title="Toggle Audio">
                <span class="icon-on">🔊</span>
                <span class="icon-off">🔇</span>
            </div>
        </div>

        <main id="game-container">
            <div id="game-board"></div>
        </main>

        <div id="ui-overlay" class="overlay hidden">
            <div class="modal">
                <div id="modal-icon" class="modal-icon"></div>
                <h2 id="modal-title">Level Complete!</h2>
                <p id="modal-msg">Congratulations!</p>
                <button id="next-level-btn" class="primary-btn">Next Level</button>
            </div>
        </div>

        <div class="level-dots" id="level-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <footer>
            <button id="menu-btn" class="util-btn">
                <span class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.76-.31 2.45-.86.61-.49 1.4-.71 2.15-.59.81.13 1.63.13 2.41 0a2 2 0 0 0 1.58-1.58c.13-.78.13-1.6 0-2.41-.12-.75.1-1.54.59-2.15.55-.69.86-1.53.86-2.45 0-5.5-4.5-10-10-10z"/></svg>
                </span>
                <span data-i18n="menuBtn">Menu</span>
            </button>
            <button id="shuffle-btn" class="util-btn">
                <span class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.414A2 2 0 0 0 4.828 17.414L22 2"/><path d="M22 22H20.586A2 2 0 0 1 19.172 21.414L2 1" style="display:none"/><path d="m21 21-4.344-4.344"/><path d="M2 5.657V2h3.657"/><path d="M2 18.343V22h3.657"/><path d="M22 5.657V2h-3.657"/><path d="M22 18.343V22h-3.657"/><path d="m14 14 5 5"/></svg>
                </span>
                <span data-i18n="shuffleBtn">Shuffle</span>
            </button>
            <button id="restart-btn" class="util-btn">
                <span class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.22L21 7"/><path d="M21 2v5h-5"/></svg>
                </span>
                <span data-i18n="restartBtn">Restart</span>
            </button>
        </footer>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
